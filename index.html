<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle Count Hub - Latest</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap');
  :root { --bg: #f7f6f3; --white: #ffffff; --accent: #1a3a2a; --red: #9b2335; --border: #e4e2dc; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .filter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
</style>
</head>
<body>

<div class="card">
  <h2>Cycle Count Hub</h2>
  <div class="filter-grid">
    <select id="filter-month" onchange="updateDashboard()"><option value="ALL">All Months</option></select>
    <select id="filter-area" onchange="updateDashboard()"><option value="ALL">All Areas</option></select>
    <select id="filter-reason" onchange="updateDashboard()"><option value="ALL">All Reasons</option></select>
  </div>
</div>

<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
  <div class="card">TOTAL AUDITED<div id="kpi-total" style="font-size:24px; font-weight:bold;">0</div></div>
  <div class="card">ACCURACY<div id="kpi-acc" style="font-size:24px; font-weight:bold;">100%</div></div>
  <div class="card">MISSES<div id="kpi-miss" style="font-size:24px; font-weight:bold;">0</div></div>
</div>

<div class="card">
  <h3>Manual Entry</h3>
  <input type="date" id="m-date"> <input type="text" id="m-area" placeholder="Area"> <input type="text" id="m-reason" placeholder="Reason">
  <button class="btn" onclick="addManualEntry()">Add/Overwrite Entry</button>
  <button class="btn" style="background:var(--red); color:white;" onclick="clearAllData()">Clear All (Pass: Anth0n)</button>
</div>

<div class="card">
  <input type="file" accept=".xlsx" onchange="parseExcel(this)">
  <table>
    <thead><tr><th>Date</th><th>Area</th><th>Reason</th><th>Total</th><th>Miss</th></tr></thead>
    <tbody id="ledger"></tbody>
  </table>
</div>

<script>
  let data = JSON.parse(localStorage.getItem('cc_data')) || [];

  function updateDashboard() {
    const month = document.getElementById('filter-month').value;
    const area = document.getElementById('filter-area').value;
    const reason = document.getElementById('filter-reason').value;
    
    const filtered = data.filter(i => 
      (month === 'ALL' || i.month === month) && 
      (area === 'ALL' || i.area === area) && 
      (reason === 'ALL' || i.reason === reason)
    );

    let tot = filtered.reduce((s, i) => s + (parseInt(i.total) || 0), 0);
    let mis = filtered.reduce((s, i) => s + (parseInt(i.miss) || 0), 0);
    document.getElementById('kpi-total').innerText = tot;
    document.getElementById('kpi-miss').innerText = mis;
    document.getElementById('kpi-acc').innerText = tot ? ((tot - mis) / tot * 100).toFixed(1) + '%' : '100%';
    
    document.getElementById('ledger').innerHTML = filtered.map(i => 
      `<tr><td>${i.date}</td><td>${i.area}</td><td>${i.reason}</td><td>${i.total}</td><td>${i.miss}</td></tr>`).join('');
  }

  function addManualEntry() {
    const entry = { date: document.getElementById('m-date').value, area: document.getElementById('m-area').value, reason: document.getElementById('m-reason').value, total: 0, miss: 0 };
    const idx = data.findIndex(i => i.date === entry.date && i.area === entry.area);
    if(idx > -1) {
      if(confirm("Record exists. Overwrite?")) data[idx] = entry;
    } else {
      data.push(entry);
    }
    saveAndRefresh();
  }

  function parseExcel(el) {
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      rows.forEach(r => {
        if(!data.some(i => i.date === r.DATE && i.area === r.AREA)) data.push({ date: r.DATE, area: r.AREA, reason: r.REASON, total: r.TOTAL, miss: r.MISS });
      });
      saveAndRefresh();
    };
    reader.readAsArrayBuffer(el.files[0]);
  }

  function clearAllData() {
    if(prompt("Enter Password:") === "Anth0n") { data = []; saveAndRefresh(); }
  }

  function saveAndRefresh() {
    localStorage.setItem('cc_data', JSON.stringify(data));
    updateDashboard();
  }
  updateDashboard();
</script>
</body>
</html>
