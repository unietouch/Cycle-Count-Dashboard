<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cycle Count Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 20px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-title { font-weight: bold; margin-bottom: 10px; color: #333; }
        .card-title-sub { font-size: 0.8em; color: #666; font-weight: normal; }
    </style>
</head>
<body>

<div class="panel active" id="panel-dashboard">
    <!-- Existing Metrics -->
    <div class="grid-2">
        <div class="card">
            <div class="card-title">Daily Accuracy Trend <span class="card-title-sub">All Areas · %</span></div>
            <canvas id="chart-trend"></canvas>
        </div>
        <div class="card">
            <div class="card-title">Hit vs Miss <span class="card-title-sub">Count per Session</span></div>
            <canvas id="chart-hitMiss"></canvas>
        </div>
    </div>

    <!-- Added Area Accuracy Charts -->
    <div class="grid-2">
        <div class="card">
            <div class="card-title">Accuracy by Area <span class="card-title-sub">Session Breakdown</span></div>
            <canvas id="chart-ov-area-bar"></canvas>
        </div>
        <div class="card">
            <div class="card-title">Accuracy Comparison <span class="card-title-sub">Radar View</span></div>
            <canvas id="chart-ov-area-radar"></canvas>
        </div>
    </div>
</div>

<script>
    // Placeholder function: Replace with your actual data source logic
    function filteredForOverview() {
        return [
            {area: 'A', total: 100, miss: 5, status: 'HIT'},
            {area: 'A', total: 100, miss: 15, status: 'MISS'},
            {area: 'B', total: 100, miss: 2, status: 'HIT'},
            {area: 'C', total: 100, miss: 10, status: 'MISS'}
        ];
    }

    function mkChart(id, config) {
        new Chart(document.getElementById(id), config);
    }

    function renderOverviewAreaCharts() {
        const recs = filteredForOverview();
        const al = [...new Set(recs.map(r=>r.area))].sort();
        if (!al.length) return;

        const stats = al.map(a=>{
            const r = recs.filter(x=>x.area===a);
            const t = r.reduce((s,x)=>s+x.total,0);
            const m = r.reduce((s,x)=>s+x.miss,0);
            const pct = t ? parseFloat(((t-m)/t*100).toFixed(2)) : 100;
            const sessions = r.length;
            const hitSessions = r.filter(x=>x.status==='HIT').length;
            return { a, pct, sessions, hitSessions, missSessions: sessions-hitSessions };
        });

        // Horizontal Bar Chart for Area Performance
        mkChart('chart-ov-area-bar', {
            type:'bar',
            data:{
                labels: stats.map(s=>s.a),
                datasets:[
                    { label:'Hit Sessions', data: stats.map(s=>s.hitSessions), backgroundColor:'#2d6a4f88', stack:'sessions' },
                    { label:'Miss Sessions', data: stats.map(s=>s.missSessions), backgroundColor:'#9b233588', stack:'sessions' }
                ]
            },
            options:{ responsive:true, indexAxis:'y', scales:{ x:{stacked:true}, y:{stacked:true} } }
        });

        // Radar Chart for Area Accuracy Comparison
        mkChart('chart-ov-area-radar', {
            type:'radar',
            data:{
                labels: stats.map(s=>s.a),
                datasets:[{ label:'Accuracy %', data: stats.map(s=>s.pct), backgroundColor:'rgba(26,58,42,0.1)', borderColor:'#1a3a2a' }]
            }
        });
    }

    // Initialize charts on load
    window.onload = renderOverviewAreaCharts;
</script>
</body>
</html>
